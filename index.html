<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Letuic | Modern EdTech Hub - Empowering Learning Ecosystems</title>
  <meta name="description"
    content="Letuic is a premium EdTech platform providing students and educators with modern digital learning tools, collaborative workspaces, and career opportunities." />

  <link rel="canonical" href="https://letuic.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://letuic.com/" />
  <meta property="og:title" content="Letuic | Modern EdTech Hub - Empowering Learning Ecosystems" />
  <meta property="og:description" content="Join the Letuic ecosystem. We empower students and educators with advanced digital tools for a brighter future of learning." />
  <meta property="og:image" content="https://letuic.com/og2.png" />
  <meta property="og:site_name" content="Letuic" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://letuic.com/" />
  <meta property="twitter:title" content="Letuic | Modern EdTech Hub" />
  <meta property="twitter:description" content="Building the future of EdTech with powerful collaboration and learning tools." />
  <meta property="twitter:image" content="https://letuic.com/og2.png" />

  <!-- Structured Data for Google Sitelinks & Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Letuic",
      "url": "https://letuic.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://letuic.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Letuic",
      "url": "https://letuic.com",
      "logo": "https://letuic.com/logo.png",
      "sameAs": [
        "https://www.linkedin.com/company/letuic",
        "https://www.instagram.com/letuic.official",
        "https://twitter.com/letuic"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "",
        "contactType": "customer service",
        "email": "contact@letuic.com"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://letuic.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Community",
          "item": "https://letuic.com/community"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Careers",
          "item": "https://letuic.com/careers"
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Contact",
          "item": "https://letuic.com/contact"
        }
      ]
    }
  </script>

  <!-- Favicon & PWA -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Font Preconnect (Faster DNS/TLS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts (display=swap shows fallback immediately, swaps when ready) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <h1 class="sr-only">Letuic – Modern EdTech Platform</h1>
    <p class="sr-only">
      Letuic is an EdTech platform designed to empower students and educators
      with modern digital learning tools, analytics, and collaboration features.
    </p>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
